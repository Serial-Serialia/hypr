general {
	border_size = 1

	gaps_in = 2
	gaps_out = 2

	float_gaps = 0

	gaps_workspaces = 0

	col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
	col.inactive_border = rgba(595959aa)
	col.nogroup_border = rgba(33ff99ee) rgba(00ccffee) 45deg

	col.nogroup_border_active = rgba(595959aa)

	layout = master

	no_focus_fallback = false

	resize_on_border = true
	extend_border_grab_area = 10
	hover_icon_on_border = true
	
	allow_tearing = false
	
	resize_corner = 0
	modal_parent_blocking = true
	locale = "en_us"

	snap  {
		enabled = false
		window_gap = 10
		monitor_gap = 10
		border_overlap= false
		respect_gaps = true
	}
}

decoration {
	rounding = 10
	rounding_power = 2

	active_opacity = 1.0
	inactive_opacity = 0.8
	fullscreen_opacity = 1.0
	dim_modal = true
	dim_inactive = false
	dim_strength = 0.5
	dim_special = 0.2
	dim_around = 0.4
	border_part_of_window = true
	
	blur {
		enabled = true
		size = 3
		passes = 1
	
		ignore_opacity = true
		new_optimizations = true
		xray = false
		noise = 0.0117
		contrast = 0.8916
		vibrancy = 0.1696
		vibrancy_darkness = 0.0
		special = true
		popups = false
		popups_ignorealpha = 0.2
		input_methods = false
		input_methods_ignorealpha = 0.2
	}

	shadow {
		enabled = true
		range = 4
		render_power = 3
		sharp = false
		ignore_window = true
		color = rgba(1a1a1aee)
		color_inactive = rgba(0a0a0aee)
		offset = 0, 0
		scale = 1.0
	}
}

animations {
	enabled = true
	
	bezier = easeOutQuint,   0.23, 1,    0.32, 1
	bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
	bezier = linear,         0,    0,    1,    1
	bezier = almostLinear,   0.5,  0.5,  0.75, 1
	bezier = quick,          0.15, 0,    0.1,  1

	animation = global, 1, 10, default
	animation = border, 1, 5.39, easeOutQuint
	animation = windows, 1, 4.79, easeOutQuint
	animation = windowsIn, 1, 4.1, easeOutQuint
	animation = windowsOut, 1, 1.49, linear
	animation = fadeIn, 1, 1.73, almostLinear
	animation = fadeOut, 1, 1.46, almostLinear
	animation = fade, 1, 3.03, quick
	animation = layers, 1, 3.81, easeOutQuint
	animation = layersIn, 1, 4, easeOutQuint
	animation = layersOut, 1, 1.5, linear
	animation = fadeLayersIn, 1, 1.79, almostLinear
	animation = fadeLayersOut, 1, 1.39, almostLinear
	animation = workspaces, 1, 1.94, almostLinear
	animation = workspacesIn, 1, 1.21, almostLinear
	animation = workspacesOut, 1, 1.94, almostLinear
	animation = zoomFactor, 1, 7, quick
}

group {
	auto_group = true
	insert_after_current = true
	focus_removed_window = true
	drag_into_group = 1
	merge_groups_on_drag = true
	merge_groups_on_groupbar = true
	group_on_movetoworkspace = false
	col.border_active = rgba(33ccffee) rgba(00ff99ee) 45deg
	col.border_inactive = rgba(595959aa)
	col.border_locked_active = rgba(3366ffee)
	col.border_locked_inactive = rgba(595959aa)

	groupbar {
		enabled = true
		font_family = MonaspiceNe Nerd Font
		font_size = 12
		font_weight_active = normal
		font_weight_inactive = normal
		gradients = false
		height = 14
		indicator_gap = 0
		indicator_height = 3
		stacked = false
		priority = 3
		render_titles = true
		text_offset = 0
		scrolling = true
		rounding = 1
		rounding_power = 0.2
		gradient_rounding = 2
		gradient_rounding_power = 2.0
		round_only_edges = true
		gradient_round_only_edges = true
		text_color = rgba(000000ee)
		#text_color_inactive = 
		#text_color_locked_active = 
		#text_color_locked_inactive =
		col.active = rgba(66ff5500)
		col.inactive = rgba(66777700)
		col.locked_active = rgba(66ff5500)
		col.locked_inactive= rgba(66775500)
		gaps_in = 2
		gaps_out = 2
		keep_upper_gap = true
		blur = false
	}
}

