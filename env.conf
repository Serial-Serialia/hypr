env = HYPRLAND_TRACE=1
env = HYPRLAND_NO_RT=1
env = HYPRLAND_NO_SD_NOTIFY=1
env = HYPRLAND_NO_SD_VARS=1

env = AQ_TRACE=1
#env = AQ_DRM_DEVICES=
env = AQ_FORCE_LINEAR_BLIT=0
env = AQ_MGPU_NO_EXPLICIT=1
env = AQ_NOMODIFIERS=1

env = GDK_BACKEND,wayland
env = QT_QPA_PLATAFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = QT_AUDIO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5c

#env = GTK_THEME
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
